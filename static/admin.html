<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Gateway · Admin</title>
<style>
  :root {
    --bg: #f5f6f8; --bg-grad: #eef0f4; --card: #ffffff; --ink: #1f2430; --muted: #6b7280;
    --faint: #9ca3af; --line: #e5e7eb; --line-soft: #f1f3f5;
    --accent: #6366f1; --accent-hover: #4f46e5; --accent-soft: #eef2ff;
    --ok: #16a34a; --ok-soft: #dcfce7; --bad: #dc2626; --bad-soft: #fee2e2; --warn: #d97706; --warn-soft: #fef3c7;
    --radius: 14px; --radius-sm: 9px;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 6px 20px rgba(16,24,40,.06);
    --shadow-sm: 0 1px 2px rgba(16,24,40,.06);
  }
  [data-theme="dark"] {
    --bg: #0e1116; --bg-grad: #0a0d12; --card: #181c24; --ink: #e5e7eb; --muted: #9ca3af;
    --faint: #6b7280; --line: #2a313b; --line-soft: #21262e;
    --accent: #818cf8; --accent-hover: #a5b4fc; --accent-soft: #1e2433;
    --ok: #22c55e; --ok-soft: #0f2e1a; --bad: #f87171; --bad-soft: #2e1518; --warn: #fbbf24; --warn-soft: #2a2118;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 28px rgba(0,0,0,.45);
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: linear-gradient(180deg, var(--bg) 0%, var(--bg-grad) 100%); background-attachment: fixed; color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  .icon { width: 16px; height: 16px; vertical-align: -3px; }
  .topbar { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: color-mix(in srgb, var(--card) 88%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
  .brand { font-size: 16px; font-weight: 750; letter-spacing: -.01em; display: flex; align-items: center; gap: 8px; }
  .brand .dotmark { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #ec4899); box-shadow: 0 0 0 3px var(--accent-soft); }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .pill { font-size: 12px; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 3px 11px; background: var(--card); display: inline-flex; align-items: center; gap: 5px; }
  .pill.on { color: var(--ok); border-color: color-mix(in srgb, var(--ok) 40%, transparent); background: var(--ok-soft); }
  .pill.warn { color: var(--bad); border-color: color-mix(in srgb, var(--bad) 40%, transparent); background: var(--bad-soft); }
  .iconbtn { appearance: none; border: 1px solid var(--line); background: var(--card); color: var(--muted); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all .15s; }
  .iconbtn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .tabs { position: sticky; top: 59px; z-index: 20; display: flex; gap: 2px; padding: 0 24px; background: color-mix(in srgb, var(--card) 80%, transparent); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); overflow-x: auto; }
  .tab { appearance: none; border: none; background: transparent; color: var(--muted); font: inherit; font-size: 13.5px; font-weight: 550; padding: 13px 16px; cursor: pointer; position: relative; white-space: nowrap; display: inline-flex; align-items: center; gap: 7px; transition: color .15s; }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); }
  .tab.active::after { content: ""; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 2px; background: var(--accent); border-radius: 2px; }
  .tab .badge { font-size: 10px; background: var(--bad); color: #fff; border-radius: 999px; padding: 0 5px; min-width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }
  main { max-width: 1040px; margin: 0 auto; padding: 22px 20px 90px; }
  .panel { display: none; }
  .panel.active { display: block; animation: fade .2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 22px; margin-bottom: 18px; }
  .card h2 { font-size: 15px; font-weight: 700; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
  .card .desc { color: var(--muted); font-size: 12.5px; margin-bottom: 16px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .btn { appearance: none; border: none; cursor: pointer; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; padding: 9px 18px; border-radius: 10px; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn:active { transform: none; }
  .btn.ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn.ghost:hover { background: var(--accent-soft); }
  .btn.subtle { background: var(--accent-soft); color: var(--accent-hover); }
  .btn.subtle:hover { background: color-mix(in srgb, var(--accent-soft) 70%, var(--accent) 15%); }
  .btn.small { padding: 6px 13px; font-size: 12.5px; border-radius: 8px; }
  .btn.danger { background: var(--bad); }
  .btn.danger:hover { background: color-mix(in srgb, var(--bad) 85%, #000); }
  .btn.danger.ghost { background: transparent; color: var(--bad); border-color: color-mix(in srgb, var(--bad) 40%, transparent); }
  .btn.danger.ghost:hover { background: var(--bad-soft); }
  .seg { display: inline-flex; background: var(--line-soft); border-radius: 10px; padding: 3px; gap: 2px; }
  .seg button { appearance: none; border: none; background: transparent; color: var(--muted); font: inherit; font-size: 12.5px; font-weight: 550; padding: 6px 14px; cursor: pointer; border-radius: 7px; transition: all .15s; }
  .seg button.active { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
  select, input[type="password"], input[type="text"], input[type="number"], textarea { font: inherit; color: var(--ink); border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; background: var(--card); outline: none; width: 100%; transition: border .15s, box-shadow .15s; }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  textarea { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px; resize: vertical; line-height: 1.5; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--line-soft); }
  td.mono, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px; }
  .chip { display: inline-block; margin: 2px 4px 2px 0; padding: 2px 10px; border-radius: 999px; font-size: 11.5px; background: var(--accent-soft); color: var(--accent-hover); font-weight: 500; }
  .chip.gray { background: var(--line-soft); color: var(--muted); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }
  .dot.bad { background: var(--bad); box-shadow: 0 0 0 3px var(--bad-soft); }
  .dot.unknown { background: var(--faint); }
  .empty { color: var(--faint); font-size: 13px; padding: 26px 0; text-align: center; }
  .error-text { color: var(--bad); font-size: 13px; }
  .switch { position: relative; display: inline-block; width: 42px; height: 24px; vertical-align: middle; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: var(--faint); border-radius: 24px; transition: .2s; opacity: .6; }
  .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; box-shadow: var(--shadow-sm); }
  .switch input:checked + .slider { background: var(--ok); opacity: 1; }
  .switch input:checked + .slider:before { transform: translateX(18px); }
  .subcard { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; background: var(--card); overflow: hidden; transition: border .15s; }
  .subcard:hover { border-color: color-mix(in srgb, var(--accent) 30%, var(--line)); }
  .subcard > .sc-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .subcard > .sc-head:hover { background: var(--line-soft); }
  .subcard .chev { color: var(--faint); transition: transform .2s; flex-shrink: 0; }
  .subcard.open .chev { transform: rotate(90deg); }
  .subcard .sc-body { display: none; padding: 4px 14px 14px; border-top: 1px solid var(--line-soft); }
  .subcard.open .sc-body { display: block; }
  .sc-title { font-weight: 650; font-size: 13.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sc-meta { font-size: 11.5px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 720px) { .grid2, .grid4 { grid-template-columns: 1fr; } }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11.5px; color: var(--muted); margin-bottom: 4px; font-weight: 550; text-transform: uppercase; letter-spacing: .03em; }
  .row-inline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; }
  .stat .lbl { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; font-weight: 550; }
  .stat .val { font-size: 22px; font-weight: 700; margin-top: 4px; letter-spacing: -.02em; }
  .stat .sub { font-size: 11.5px; color: var(--faint); margin-top: 2px; }
  .savebar { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(80px); z-index: 40; display: flex; align-items: center; gap: 12px; padding: 10px 12px 10px 18px; background: var(--ink); color: #fff; border-radius: 999px; box-shadow: 0 8px 30px rgba(16,24,40,.25); transition: transform .25s cubic-bezier(.2,.8,.2,1); }
  [data-theme="dark"] .savebar { background: #2a313b; border: 1px solid var(--line); }
  .savebar.show { transform: translateX(-50%) translateY(0); }
  .savebar .txt { font-size: 13px; font-weight: 550; display: flex; align-items: center; gap: 7px; }
  .savebar .txt .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); box-shadow: 0 0 0 0 var(--warn); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--warn) 60%, transparent); } 70% { box-shadow: 0 0 0 8px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: all .25s; z-index: 50; box-shadow: 0 8px 30px rgba(16,24,40,.25); }
  .toast.show { opacity: .97; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--bad); }
  .overlay { position: fixed; inset: 0; z-index: 60; background: color-mix(in srgb, #000 50%, transparent); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; padding: 20px; }
  .overlay.show { display: flex; animation: fade .2s; }
  .modal { background: var(--card); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 24px; max-width: 380px; width: 100%; }
  .modal h3 { font-size: 16px; margin-bottom: 8px; }
  .modal p { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .modal .actions { display: flex; gap: 10px; justify-content: flex-end; }
  #auth-overlay .modal { max-width: 360px; }
  #auth-overlay .modal h3 { display: flex; align-items: center; gap: 8px; }
  footer { text-align: center; color: var(--faint); font-size: 12px; padding: 10px 0 0; }
  .hint { font-size: 11.5px; color: var(--faint); margin-top: 4px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dotmark"></span> LLM <span style="color:var(--accent)">Gateway</span></div>
  <div class="top-actions">
    <span id="auth-pill" class="pill" data-i18n="checking"></span>
    <button id="btn-lang" class="iconbtn" title="Language">EN</button>
    <button id="btn-theme" class="iconbtn" title="Theme"></button>
    <button id="btn-refresh" class="iconbtn" title="Refresh">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
    </button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" data-tab="config"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span data-i18n="tab_config"></span><span class="badge" id="dirty-badge" style="display:none">•</span></button>
  <button class="tab" data-tab="overview"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span data-i18n="tab_overview"></span></button>
  <button class="tab" data-tab="usage"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></svg><span data-i18n="tab_usage"></span></button>
  <button class="tab" data-tab="test"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2h6"/><path d="M10 2v6.5L5 18a2 2 0 0 0 1.8 3h10.4A2 2 0 0 0 19 18l-5-9.5V2"/><path d="M8 14h8"/></svg><span data-i18n="tab_test"></span></button>
</div>

<main>
  <div class="panel active" id="panel-config">
    <div class="card">
      <h2 data-i18n="auth_and_limit"></h2>
      <div class="desc" data-i18n="auth_desc"></div>
      <div id="auth-editor"></div>
    </div>
    <div class="card">
      <div class="section-head"><h2>Providers</h2><button class="btn subtle small" id="add-prov"><span data-i18n="add_provider"></span></button></div>
      <div id="prov-list"></div>
    </div>
    <div class="card">
      <div class="section-head"><h2 data-i18n="aliases"></h2><button class="btn subtle small" id="add-alias"><span data-i18n="add_alias"></span></button></div>
      <div id="alias-list"></div>
    </div>
    <div class="card">
      <div class="section-head"><h2>MOA</h2><button class="btn subtle small" id="add-moa"><span data-i18n="add_pipeline"></span></button></div>
      <div id="moa-list"></div>
    </div>
  </div>

  <div class="panel" id="panel-overview">
    <div class="card">
      <div class="section-head"><h2 data-i18n="overview"></h2><button class="btn ghost small" id="btn-health"><span data-i18n="health_check"></span></button></div>
      <div id="server-info"></div>
      <h3 style="margin:18px 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;">Providers</h3>
      <div id="providers-wrap"></div>
      <h3 style="margin:18px 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;" data-i18n="aliases"></h3>
      <div id="aliases-wrap"></div>
    </div>
  </div>

  <div class="panel" id="panel-usage">
    <div class="card">
      <div class="section-head"><h2 data-i18n="usage_dashboard"></h2>
        <div class="seg" id="days-seg"><button data-days="1">1d</button><button data-days="7" class="active">7d</button><button data-days="30">30d</button></div>
      </div>
      <div class="grid4" id="usage-tiles"></div>
      <h3 style="margin:18px 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;" data-i18n="by_model"></h3>
      <div id="usage-by-model"></div>
    </div>
    <div class="card">
      <h2 data-i18n="recent_calls"></h2>
      <div id="usage-recent" style="margin-top:10px;"></div>
    </div>
  </div>

  <div class="panel" id="panel-test">
    <div class="card">
      <h2 data-i18n="model_test"></h2>
      <div class="desc" data-i18n="model_test_desc"></div>
      <div class="row-inline" style="margin-bottom:12px;">
        <select id="model-select" style="max-width:420px;"><option value="" data-i18n="loading"></option></select>
        <button id="btn-test" class="btn" data-i18n="send_test"></button>
      </div>
      <div id="test-result"></div>
    </div>
  </div>
  <footer data-i18n="footer"></footer>
</main>

<div class="savebar" id="savebar">
  <span class="txt"><span class="pulse"></span><span data-i18n="unsaved"></span></span>
  <button class="btn small ghost" id="btn-discard" style="background:transparent;color:#fff;border-color:rgba(255,255,255,.3)"><span data-i18n="discard"></span></button>
  <button class="btn small" id="btn-save" style="background:#fff;color:var(--ink)"><span data-i18n="save"></span></button>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="confirm-overlay">
  <div class="modal">
    <h3 id="confirm-title"></h3>
    <p id="confirm-msg"></p>
    <div class="actions">
      <button class="btn ghost" id="confirm-cancel" data-i18n="cancel"></button>
      <button class="btn danger" id="confirm-ok" data-i18n="confirm"></button>
    </div>
  </div>
</div>

<div class="overlay" id="auth-overlay">
  <div class="modal">
    <h3><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span data-i18n="auth_title"></span></h3>
    <p data-i18n="auth_prompt"></p>
    <input id="auth-input" type="password" placeholder="master key" style="margin-bottom:14px;">
    <div class="actions"><button class="btn" id="auth-submit" data-i18n="enter"></button></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var LS_KEY = "llm_gateway_master_key", LS_LANG = "llm_gateway_lang", LS_THEME = "llm_gateway_theme";
  var LANG = localStorage.getItem(LS_LANG) || "en";
  var THEME = localStorage.getItem(LS_THEME) || (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  var masterKey = localStorage.getItem(LS_KEY) || "";
  var currentDays = 7, raw = null, dirty = false, currentTab = "config";
  var expanded = { prov: new Set(), moa: new Set() };
  var $ = function (s) { return document.querySelector(s); };
  var $$ = function (s) { return Array.prototype.slice.call(document.querySelectorAll(s)); };

  var I18N = {
    en: {
      checking: "Checking…", auth_title: "Authentication required", auth_prompt: "Auth is on. Enter the master key to continue.",
      invalid_key: "Key invalid or expired, please re-enter.", enter: "Enter", tab_config: "Config", tab_overview: "Overview",
      tab_usage: "Usage", tab_test: "Test", auth_and_limit: "Auth & Rate Limit", auth_desc: "Toggle API auth and rate limit. Changes apply on save.",
      auth_toggle_lbl: "Enable API auth (master_key); when off, both the console and /v1/* are unauthenticated (local only)",
      master_key_lbl: "Master Key", gen_key: "Generate", rpm_lbl: "Requests / min per caller key (0 = unlimited)",
      add_provider: "Add provider", add_alias: "Add alias", add_pipeline: "Add pipeline", no_provider: "No provider configured",

  function fmtNum(n) { n = Number(n)||0; if (n>=1e6) return (n/1e6).toFixed(1)+"M"; if (n>=1e3) return (n/1e3).toFixed(1)+"k"; return String(n); }
  function fmtTs(ts) { if (!ts) return "-"; var d=new Date(ts*1000), p=function(x){return String(x).padStart(2,"0");}; return (d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds()); }

    ok.addEventListener("click",h1); cc.addEventListener("click",h2); }

  function api(path, options) {
    options = options || {}; var headers = options.headers || {};
    if (masterKey) headers["Authorization"] = "Bearer " + masterKey;
    if (options.json !== undefined) { headers["Content-Type"]="application/json"; options.body=JSON.stringify(options.json); delete options.json; }
    options.headers = headers;
    return fetch(path, options).then(function(resp){
      if (resp.status === 401) { showAuth(); throw new Error("unauthorized"); }
      if (!resp.ok) { return resp.text().then(function(tx){ throw new Error("HTTP "+resp.status+": "+tx.slice(0,200)); }); }
      return resp.json();
    });
  }

  function loadOverview(){ api("/admin/api/config").then(renderOverview).catch(function(){}); }
  function renderOverview(cfg){ var s=cfg.server||{}, rl=cfg.rate_limit||{};
    $("#server-info").innerHTML='<table><tbody><tr><th style="width:120px;">'+t("listen")+'</th><td class="mono">'+esc(s.host||"-")+":"+esc(s.port||"-")+'</td></tr><tr><th>'+t("master_key")+'</th><td class="mono">'+(s.master_key?esc(s.master_key):'<span class="error-text">'+t("no_key_set")+'</span>')+'</td></tr><tr><th>'+t("rate_limit")+'</th><td>'+(rl.requests_per_minute?esc(rl.requests_per_minute)+t("per_min"):t("no_limit"))+'</td></tr></tbody></table>';
    var provs=cfg.providers||{}, names=Object.keys(provs);
    if(!names.length){ $("#providers-wrap").innerHTML='<div class="empty">'+t("no_provider")+'</div>'; }
    else { var ph='<table><thead><tr><th>Provider</th><th>'+t("type")+'</th><th>'+t("base_url")+'</th><th>'+t("col_keypool")+'</th><th>'+t("col_model")+'</th><th>'+t("col_health")+'</th></tr></thead><tbody>';
      names.forEach(function(n){ var p=provs[n]||{}; var keys=(p.keys||[]).map(function(k){return '<span class="chip gray mono">'+esc(k)+'</span>';}).join(""); var models=(p.models||[]).map(function(m){return '<span class="chip">'+esc(m)+'</span>';}).join("");
        ph+="<tr><td><strong>"+esc(n)+"</strong></td><td>"+esc(p.type||"-")+"</td><td class='mono'>"+esc(p.base_url||"-")+"</td><td>"+(keys||"-")+"</td><td>"+(models||"-")+"</td><td data-health='"+esc(n)+"'><span class='dot unknown'></span><span style='color:var(--muted);font-size:12px;'>"+t("not_checked")+"</span></td></tr>"; });
      $("#providers-wrap").innerHTML=ph+"</tbody></table>"; }
    var al=cfg.aliases||{}, an=Object.keys(al);
    if(!an.length){ $("#aliases-wrap").innerHTML='<div class="empty">'+t("no_alias")+'</div>'; }
    else { var ah='<table><thead><tr><th>'+t("aliases")+'</th><th>'+t("router")+'</th></tr></thead><tbody>'; an.forEach(function(a){ ah+='<tr><td class="mono"><strong>'+esc(a)+'</strong></td><td class="mono">'+esc(al[a])+'</td></tr>'; }); $("#aliases-wrap").innerHTML=ah+"</tbody></table>"; }
    var sel=$("#model-select"), html="";
    if(an.length){ html+='<optgroup label="'+t("aliases")+'">'; an.forEach(function(a){html+='<option value="'+esc(a)+'">'+esc(a)+" → "+esc(al[a])+'</option>';}); html+='</optgroup>'; }
    Object.keys(provs).forEach(function(n){ var ms=(provs[n]||{}).models||[]; if(!ms.length)return; html+='<optgroup label="Provider: '+esc(n)+'">'; ms.forEach(function(m){html+='<option value="'+esc(m)+'">'+esc(n)+" / "+esc(m)+'</option>';}); html+='</optgroup>'; });
    sel.innerHTML=html||'<option value="">'+t("no_models")+'</option>';
  }
  $("#btn-health").addEventListener("click", function(){ api("/admin/api/health").then(function(res){ Object.keys(res).forEach(function(n){ var cell=document.querySelector('td[data-health="'+esc(n)+'"]'); if(!cell)return; var r=res[n]; cell.innerHTML='<span class="dot '+(r.ok?'ok':'bad')+'"></span><span style="font-size:12px;">'+(r.ok?r.latency_ms+'ms':esc(r.error||'fail'))+'</span>'; }); }).catch(function(){ toast(t("health_fail"),true); }); });

  function loadUsage(){ api("/admin/api/usage/summary?days="+currentDays).then(renderUsage); api("/admin/api/usage/recent").then(renderRecent); }
  function renderUsage(d){ var tt=d.totals||{};
    $("#usage-tiles").innerHTML=
      '<div class="stat"><div class="lbl">'+t("calls")+'</div><div class="val">'+fmtNum(tt.calls)+'</div><div class="sub">'+fmtNum(tt.total_tokens)+' '+t("total_tokens").toLowerCase()+'</div></div>'+
      '<div class="stat"><div class="lbl">'+t("prompt")+'</div><div class="val">'+fmtNum(tt.prompt_tokens)+'</div><div class="sub">'+fmtNum(tt.completion_tokens)+' '+t("completion").toLowerCase()+'</div></div>'+
      '<div class="stat"><div class="lbl">'+t("avg_latency")+'</div><div class="val">'+fmtNum(tt.avg_latency_ms)+'<span style="font-size:13px;color:var(--muted)"> ms</span></div><div class="sub">&nbsp;</div></div>'+
      '<div class="stat"><div class="lbl">'+t("success_rate")+'</div><div class="val" style="color:var(--ok)">'+fmtRate(tt.success_rate)+'</div><div class="sub">&nbsp;</div></div>';
    var by=d.by_model||[];
    if(!by.length){ $("#usage-by-model").innerHTML='<div class="empty">'+t("no_records")+'</div>'; }
    else { var h='<table><thead><tr><th>'+t("col_model")+'</th><th>'+t("col_count")+'</th><th>'+t("total_tokens")+'</th><th>'+t("col_latency")+'</th><th>'+t("success_rate")+'</th></tr></thead><tbody>'; by.forEach(function(m){ h+='<tr><td class="mono">'+esc(m.model)+'</td><td>'+fmtNum(m.calls)+'</td><td>'+fmtNum(m.total_tokens)+'</td><td>'+fmtNum(m.avg_latency_ms)+'ms</td><td>'+fmtRate(m.success_rate)+'</td></tr>'; }); $("#usage-by-model").innerHTML=h+'</tbody></table>'; }
  }
  function renderRecent(rows){ rows=rows.rows||rows||[];
    if(!rows.length){ $("#usage-recent").innerHTML='<div class="empty">'+t("no_records")+'</div>'; return; }
    var h='<table><thead><tr><th>'+t("col_time")+'</th><th>'+t("col_model")+'</th><th>'+t("col_provider")+'</th><th>'+t("total_tokens")+'</th><th>'+t("col_latency")+'</th><th>'+t("col_status")+'</th><th>'+t("col_stream")+'</th></tr></thead><tbody>';
    rows.slice(0,50).forEach(function(r){ h+='<tr><td>'+fmtTs(r.ts)+'</td><td class="mono">'+esc(r.model)+'</td><td>'+esc(r.provider)+'</td><td>'+fmtNum(r.total_tokens)+'</td><td>'+fmtNum(r.latency_ms)+'ms</td><td>'+(r.status>=200&&r.status<300?'<span class="dot ok"></span>'+r.status:'<span class="dot bad"></span>'+r.status)+'</td><td>'+(r.stream?t("yes"):t("no"))+'</td></tr>'; });
    $("#usage-recent").innerHTML=h+'</tbody></table>';
  }
  $$("#days-seg button").forEach(function(b){ b.addEventListener("click", function(){ $$("#days-seg button").forEach(function(x){x.classList.remove("active");}); b.classList.add("active"); currentDays=parseInt(b.dataset.days,10); loadUsage(); }); });

  $("#btn-test").addEventListener("click", function(){ var m=$("#model-select").value; if(!m){ toast(t("pick_model"),true); return; } $("#test-result").innerHTML='<span class="error-text">'+t("testing")+'</span>'; api("/admin/api/test",{method:"POST",json:{model:m}}).then(function(r){ if(r.ok) $("#test-result").innerHTML='<span class="dot ok"></span> '+r.latency_ms+'ms · '+t("reply")+': '+esc(r.reply); else $("#test-result").innerHTML='<span class="dot bad"></span> '+t("fail")+': '+esc(r.error); }).catch(function(e){ $("#test-result").innerHTML='<span class="dot bad"></span> '+esc(e.message); }); });

  applyTheme(); applyStatic(); init();
})();
</script>
</body>
</html>
