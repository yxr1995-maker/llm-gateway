# =====================================================================
# llm-gateway example config
# Usage: cp config.example.yaml config.yaml, then edit as needed
# config hot-reloads: changes take effect on save, no restart needed
# =====================================================================

server:
  host: 0.0.0.0                     # listen address; for local use set 127.0.0.1
  port: 8080                        # listen port
  master_key: "sk-local-xxxx"       # key for calling the gateway / admin console; empty "" means no auth (local debugging only)

# ---------------------------------------------------------------------
# Provider list：one entry per provider
#   type:     openai_like (OpenAI-compatible protocol) / anthropic / gemini
#   base_url: upstream API URL (see the README cheat sheet)
#   keys:     key pool, round-robin; a failed key auto-fails-over
#   models:   available models for this provider
# ---------------------------------------------------------------------
providers:
  # ---- OpenAI ----
  openai:
    type: openai_like
    base_url: https://api.openai.com/v1
    keys: ["sk-xxxxxxxx", "sk-yyyyyyyy"]
    models:
      - name: gpt-4o
        context: 128000      # optional context window (exposed via GET /v1/models)
      - gpt-4o-mini          # plain string is also fine
    supports_responses: true   # set true when the upstream natively supports /v1/responses (passthrough fast path)
    # image_path: images/generations  # media-gen endpoint paths (OpenAI-compatible); override if upstream differs
    # video_path: videos/generations

  # ---- Anthropic（Claude）----
  anthropic:
    type: anthropic                 # Messages API; the gateway auto-converts to OpenAI format
    base_url: https://api.anthropic.com
    keys: ["sk-ant-xxxxxxxx"]
    models: ["claude-sonnet-4-5", "claude-opus-4-1"]

  # ---- DeepSeek ----
  deepseek:
    type: openai_like               # DeepSeek uses the OpenAI-compatible protocol
    base_url: https://api.deepseek.com/v1
    keys: ["sk-xxxxxxxx"]
    models: ["deepseek-chat", "deepseek-reasoner"]

  # ---- Google Gemini ----
  gemini:
    type: gemini                    # Gemini protocol; the gateway auto-converts to OpenAI format
    base_url: https://generativelanguage.googleapis.com/v1beta
    keys: ["AIzaSyxxxxxxxx"]
    models: ["gemini-2.5-pro", "gemini-2.5-flash"]

  # ---- add other OpenAI-compatible services likewise (example: Moonshot Kimi)----
  # moonshot:
  #   type: openai_like
  #   base_url: https://api.moonshot.cn/v1
  #   keys: ["sk-xxxxxxxx"]
  #   models: ["kimi-k2-0711-preview"]

# ---------------------------------------------------------------------
# aliases: clients can use a short alias; format is  alias: provider/model
# e.g. setting model to claude in Codex routes to anthropic/claude-sonnet-4-5
# ---------------------------------------------------------------------
aliases:
  gpt: openai/gpt-4o
  claude: anthropic/claude-sonnet-4-5
  ds: deepseek/deepseek-chat
  gem: gemini/gemini-2.5-flash

# ---------------------------------------------------------------------
# Mixture-of-Agents (MOA): multiple proposers in parallel -> aggregator synthesis
# trigger by setting model to moa:<name> (e.g. moa:default); a failed proposer is auto-skipped
# ---------------------------------------------------------------------
moa:
  default:
    proposers:
      - provider: openai
        model: gpt-4o
        reasoning_effort: low     # optional: none/low/medium/high
      - provider: anthropic
        model: claude-sonnet-4-5
    default_reasoning_effort: medium   # default reasoning effort for agents (none/low/medium/high/very_high)
    aggregator:
      provider: openai
      model: gpt-4o
      reasoning_effort: medium   # reasoning effort for the synthesizer
    # token-saving options (optional):
    # dedup: true                # merge similar proposer outputs before aggregating
    # early_stop: true           # stop once a proposer agrees with a previous one
    # compress: {enabled: true, max_chars: 600, summarizer: {provider: deepseek, model: deepseek-chat}}
  # Multimodal hybrid pipeline (stages): mix text / vision / image-gen / video-gen.
  # Trigger with model: moa:hybrid
  hybrid:
    max_concurrency: 4            # cap in-flight calls to protect per-stream TPS
    default_reasoning_effort: medium
    stages:
      - provider: openai
        model: gpt-4o
        modality: image           # generate an image from the user prompt
        prompt: a studio photo of a cat
      - provider: openai
        model: gpt-4o
        modality: vision          # describe the generated image
      - provider: openai
        model: gpt-4o
        modality: text            # final synthesis (streamed to the client)
    # aggregator_prompt: "custom synthesis prompt (optional)"

# ---------------------------------------------------------------------
# Planner-Worker (independent of MOA): a strong planner decomposes the task,
# cheap workers execute subtasks in parallel, the planner synthesizes.
# Trigger with model: pw:<name>
# ---------------------------------------------------------------------
planner_worker:
  solve:
    planner:
      provider: openai
      model: gpt-4o
      reasoning_effort: high      # strong model: only planning + synthesis
    workers:                      # cheap models: grunt work
      - provider: deepseek
        model: deepseek-chat
        reasoning_effort: low
      - provider: openai
        model: gpt-4o-mini
    max_rounds: 1                 # planner may re-plan over worker results
    max_concurrency: 4

# ---------------------------------------------------------------------
# Cascade: tiered by reasoning level (L0 fast/cheap -> Ln T1/expensive).
# A cheap router picks the start tier; self-consistency + self-verify decide
# whether to accept or escalate. T1 is the quality floor. Trigger: cascade:<name>
# ---------------------------------------------------------------------
cascade:
  solve:
    router: { provider: openai, model: gpt-4o-mini }
    tiers:
      - {name: L0, provider: openai, model: gpt-4o-mini, reasoning_effort: none}
      - {name: L1, provider: openai, model: gpt-4o, reasoning_effort: low}
      - {name: L2, provider: openai, model: gpt-4o, reasoning_effort: high}   # T1 floor
    consensus_k: 3
    strictness: balanced      # frugal / balanced / strict
    t1_verify: false          # strict: have T1 verify/rewrite low-confidence results

# ---------------------------------------------------------------------
# Result cache (optional): caches non-stream upstream calls by (provider,model,body)
# ---------------------------------------------------------------------
cache:
  enabled: false
  ttl: 3600

# ---------------------------------------------------------------------
# rate-limit: per (caller key + model) token-bucket limit (in-process)
# ---------------------------------------------------------------------
rate_limit:
  requests_per_minute: 60           # requests per minute; 0 = unlimited
